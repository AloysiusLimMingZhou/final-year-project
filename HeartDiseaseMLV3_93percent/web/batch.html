
<!doctype html>
<html lang="en" data-theme="clean">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heart Disease Predictor — Batch</title>
  <link rel="stylesheet" href="/ui/assets/css/styles.css">
</head>
<body>
  
<header class="site-header">
  <div class="brand">
    
<svg class="logo" viewBox="0 0 300 60" aria-hidden="true">
  <defs>
    <linearGradient id="grad1" x1="0" x2="1">
      <stop offset="0%" stop-color="var(--accent-a)"/>
      <stop offset="100%" stop-color="var(--accent-b)"/>
    </linearGradient>
  </defs>
  <path d="M5 30 H40 l10 -10 l10 20 l12 -35 l10 50 l10 -25 h25" stroke="url(#grad1)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(170,10)">
    <path d="M20 10 C20 5, 30 0, 35 8 C40 0, 50 5, 50 10 C50 20, 35 30, 35 30 C35 30, 20 20, 20 10 Z"
      fill="url(#grad1)" opacity="0.9"/>
  </g>
</svg>

    <div class="title">
      <div class="app">Heart Disease Predictor</div>
      <div class="tag">educational decision‑support</div>
    </div>
  </div>
  <nav class="topnav">
    <a href="./index.html">Predict</a>
    <a href="./batch.html">Batch</a>
    <a href="./admin.html">Admin</a>
    <a href="/docs" target="_blank" class="ghost">API Docs</a>
  </nav>
  <div class="theme-switcher">
    <label>Theme
      <select id="theme-select">
        <option value="sakura">Sakura ❀</option>
        <option value="clean">Clean Medical</option>
        <option value="neon">Neon ECG</option>
        <option value="pixel">Pixel Clinic</option>
      </select>
    </label>
  </div>
</header>


  <main>
    <section class="card">
      <h2>Batch Prediction</h2>
      <p>Upload a CSV with headers matching the model features.</p>
      <form id="batch-form" class="row">
        <input type="file" name="file" accept=".csv" required />
        <button type="submit" class="primary">Upload & Predict</button>
        <a class="ghost" href="./assets/template.csv" download>Download CSV template</a>
      </form>
      <div id="batch-result" class="output"></div>
    </section>
  </main>

  <script src="/ui/assets/js/theme.js"></script>
  <script src="/ui/assets/js/batch.js"></script>
</body>
</html>
