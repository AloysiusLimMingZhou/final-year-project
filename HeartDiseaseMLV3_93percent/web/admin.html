<!doctype html>
<html lang="en" data-theme="sakura">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Heart Disease Predictor • Admin</title>
  <!-- ✅ absolute path so FastAPI StaticFiles resolves -->
  <link rel="stylesheet" href="/ui/assets/css/styles.css" />
</head>
<body>
  <!-- Header / Nav -->
  <header class="site-header">
    <div class="brand">
      <svg class="logo" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M5 20h18l6-12 6 24 6-12h18" stroke="currentColor" stroke-width="2.5" />
        <circle cx="75" cy="20" r="2.2" fill="currentColor"/>
      </svg>
      <div class="title">
        <div class="app">Heart Disease Predictor</div>
        <div class="tag">educational decision-support</div>
      </div>
    </div>
    <nav class="topnav">
      <a href="./index.html">Predict</a>
      <a href="./batch.html">Batch</a>
      <a href="./admin.html"><b>Admin</b></a>
      <a class="ghost" href="../docs" target="_blank" rel="noreferrer">API Docs</a>
    </nav>
    <div class="theme-switcher">
      <label>
        Theme
        <select id="theme-select">
          <option value="sakura" selected>Sakura ❀</option>
          <option value="clean">Clean Medical</option>
          <option value="neon">Neon ECG</option>
          <option value="pixel">Pixel Clinic</option>
        </select>
      </label>
    </div>
  </header>

  <main>
    <!-- About / Active Model + Compare + Plot -->
    <section class="card">
      <h2>About / Active Model</h2>

      <div class="row">
        <button id="refresh-health" class="primary">Refresh</button>
        <button id="compare-btn" class="ghost">Compare Models</button>

        <label>
          Sort by
          <select id="sort-by">
            <option value="roc_auc" selected>roc_auc</option>
            <option value="accuracy">accuracy</option>
            <option value="precision">precision</option>
            <option value="recall">recall</option>
            <option value="f1">f1</option>
            <option value="pr_auc">pr_auc</option>
          </select>
        </label>

        <label>
          Top N
          <input id="top-n" type="number" min="1" value="1" />
        </label>

        <button id="plot-btn" class="ghost">Generate Plot</button>

        <label>
          Metric
          <select id="plot-metric">
            <option value="roc_auc" selected>roc_auc</option>
            <option value="accuracy">accuracy</option>
            <option value="precision">precision</option>
            <option value="recall">recall</option>
            <option value="f1">f1</option>
            <option value="pr_auc">pr_auc</option>
          </select>
        </label>
      </div>

      <!-- Two columns: JSON on the left, plot on the right -->
      <div class="flex-2">
        <pre id="health-output" class="output pretty">{ }</pre>
        <div id="plot-area" class="plotbox">
          <!-- plot image inserted here -->
        </div>
      </div>

      <!-- Compare results -->
      <pre id="compare-output" class="output pretty">{ }</pre>
    </section>

    <!-- Artifacts -->
    <section class="card">
      <h2>Artifacts</h2>
      <div class="row">
        <button id="list-artifacts" class="primary">List Artifacts</button>
      </div>
      <ul id="artifact-list"></ul>
    </section>
  </main>

  <!-- ✅ absolute path so FastAPI serves JS -->
  <script src="/ui/assets/js/admin.js"></script>
  <script>
    // Simple theme switcher (persists to localStorage)
    (function () {
      const sel = document.getElementById('theme-select');
      const saved = localStorage.getItem('hdp-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);

      sel.value = document.documentElement.getAttribute('data-theme') || 'sakura';
      sel.addEventListener('change', () => {
        document.documentElement.setAttribute('data-theme', sel.value);
        localStorage.setItem('hdp-theme', sel.value);
      });
    })();
  </script>
</body>
</html>
